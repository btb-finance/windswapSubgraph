specVersion: 1.0.0
schema:
  file: ./schema.graphql
dataSources:
  # CL Factory - tracks new CL pools
  - kind: ethereum
    name: CLFactory
    network: base
    source:
      address: "0x88888493d3e3a133cB80da23610f23a6D563D083"
      abi: CLFactory
      startBlock: 43426496
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Token
        - Protocol
      abis:
        - name: CLFactory
          file: ./abis/CLFactory.json
        - name: CLPool
          file: ./abis/CLPool.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: PoolCreated(indexed address,indexed address,indexed int24,address)
          handler: handlePoolCreated
      file: ./src/cl-factory.ts

  # NonfungiblePositionManager - tracks LP positions
  - kind: ethereum
    name: NonfungiblePositionManager
    network: base
    source:
      address: "0x8888ef0BbF7aF08bBbaca8d6596F8Df18C78AE19"
      abi: NonfungiblePositionManager
      startBlock: 43426496
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Position
        - User
        - Collect
      abis:
        - name: NonfungiblePositionManager
          file: ./abis/NonfungiblePositionManager.json
        - name: CLPool
          file: ./abis/CLPool.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: IncreaseLiquidity(indexed uint256,uint128,uint256,uint256)
          handler: handleIncreaseLiquidity
        - event: DecreaseLiquidity(indexed uint256,uint128,uint256,uint256)
          handler: handleDecreaseLiquidity
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
        - event: Collect(indexed uint256,address,uint256,uint256)
          handler: handleCollect
      file: ./src/position-manager.ts

  # VotingEscrow - tracks veNFTs (locked WIND)
  - kind: ethereum
    name: VotingEscrow
    network: base
    source:
      address: "0x88889e34e5Eb7a8F0f986DDce5f2711220A0c02F"
      abi: VotingEscrow
      startBlock: 43426496
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VeNFT
        - User
      abis:
        - name: VotingEscrow
          file: ./abis/VotingEscrow.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Deposit(indexed address,indexed uint256,uint8,uint256,uint256,indexed uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed uint256,uint256,uint256)
          handler: handleWithdraw
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleVeTransfer
        - event: LockPermanent(indexed address,indexed uint256,uint256,uint256)
          handler: handleLockPermanent
      file: ./src/voting-escrow.ts

  # Voter - tracks votes on pools
  - kind: ethereum
    name: Voter
    network: base
    source:
      address: "0x888843352588d670F0e0c009Ec276d5F055aE9Ed"
      abi: Voter
      startBlock: 43426496
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Vote
        - User
      abis:
        - name: Voter
          file: ./abis/Voter.json
      eventHandlers:
        - event: Voted(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleVoted
        - event: Abstained(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleAbstained
        - event: GaugeCreated(indexed address,indexed address,indexed address,address,address,address,address,address)
          handler: handleGaugeCreated
        - event: DistributeReward(indexed address,indexed address,uint256)
          handler: handleDistributeReward
      file: ./src/voter.ts

  # ProtocolGovernor - tracks governance proposals and votes
  - kind: ethereum
    name: ProtocolGovernor
    network: base
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ProtocolGovernor
      startBlock: 43426496
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - ProposalVote
      abis:
        - name: ProtocolGovernor
          file: ./abis/ProtocolGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: VoteCast(indexed address,indexed uint256,uint256,uint8,uint256,string)
          handler: handleVoteCast
      file: ./src/protocol-governor.ts

  # GaugeFactory - tracks V2 gauge creation
  - kind: ethereum
    name: GaugeFactory
    network: base
    source:
      address: "0x8888fc8623ca00349e4f947Dd99330F3AF75a941"
      abi: GaugeFactory
      startBlock: 43426496
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Gauge
        - Pool
      abis:
        - name: GaugeFactory
          file: ./abis/GaugeFactory.json
        - name: Gauge
          file: ./abis/Gauge.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: GaugeCreated(indexed address,indexed address,uint256)
          handler: handleV2GaugeCreated
      file: ./src/gauge.ts

  # CLGaugeFactory - tracks CL gauge creation
  - kind: ethereum
    name: CLGaugeFactory
    network: base
    source:
      address: "0x888898D1d00867F2FEe511A30Fa56913F8e88728"
      abi: CLGaugeFactory
      startBlock: 43426496
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Gauge
        - Pool
      abis:
        - name: CLGaugeFactory
          file: ./abis/CLGaugeFactory.json
        - name: CLGauge
          file: ./abis/CLGauge.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: GaugeCreated(indexed address,indexed address,indexed address,uint256)
          handler: handleCLGaugeCreated
      file: ./src/gauge.ts

  # RewardsDistributor - tracks veNFT rewards and rebases
  - kind: ethereum
    name: RewardsDistributor
    network: base
    source:
      address: "0x88881105D16f242B791fE8D713C254D3992b2A6E"
      abi: RewardsDistributor
      startBlock: 43426496
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VeNFT
        - VeNFTRewards
      abis:
        - name: RewardsDistributor
          file: ./abis/RewardsDistributor.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Claimed(indexed uint256,indexed uint256,indexed uint256,uint256)
          handler: handleVeNFTClaimed
      file: ./src/rewards-distributor.ts

  # Minter - tracks epoch data for voting
  - kind: ethereum
    name: Minter
    network: base
    source:
      address: "0x88882CEe351fA534C1b2DB2c72A6762F6c80c4BC"
      abi: Minter
      startBlock: 43426496
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Protocol
      abis:
        - name: Minter
          file: ./abis/Minter.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Mint(indexed address,uint256,uint256,indexed bool)
          handler: handleMint
      file: ./src/minter.ts

templates:
  # CL Pool template for swap/mint/burn events
  - kind: ethereum
    name: CLPool
    network: base
    source:
      abi: CLPool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - Swap
        - Mint
        - Burn
        - Transaction
        - Token
        - TokenDayData
        - Bundle
        - PoolDayData
        - PoolHourData
        - LiquidityPosition
        - LiquidityPositionSnapshot
      abis:
        - name: CLPool
          file: ./abis/CLPool.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleSwap
        - event: Mint(address,indexed address,indexed int24,indexed int24,uint128,uint256,uint256)
          handler: handleMint
        - event: Burn(indexed address,indexed int24,indexed int24,uint128,uint256,uint256)
          handler: handleBurn
      file: ./src/cl-pool.ts

  # V2 Gauge template for staking events
  - kind: ethereum
    name: Gauge
    network: base
    source:
      abi: Gauge
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Gauge
        - GaugeStakedPosition
      abis:
        - name: Gauge
          file: ./abis/Gauge.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256)
          handler: handleStaked
        - event: Withdraw(indexed address,uint256)
          handler: handleWithdrawn
        - event: ClaimRewards(indexed address,uint256)
          handler: handleClaimed
        - event: NotifyReward(indexed address,uint256)
          handler: handleRewardAdded
      file: ./src/gauge.ts

  # CL Gauge template for staking events
  - kind: ethereum
    name: CLGauge
    network: base
    source:
      abi: CLGauge
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Gauge
        - GaugeStakedPosition
        - Position
      abis:
        - name: CLGauge
          file: ./abis/CLGauge.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Deposit(indexed address,indexed uint256,indexed uint128)
          handler: handleCLStaked
        - event: Withdraw(indexed address,indexed uint256,indexed uint128)
          handler: handleCLWithdrawn
        - event: ClaimRewards(indexed address,uint256)
          handler: handleCLClaimed
        - event: NotifyReward(indexed address,uint256)
          handler: handleCLRewardAdded
      file: ./src/gauge.ts

  # VotingReward template for fee/bribe voting reward contracts (dynamically created per gauge)
  - kind: ethereum
    name: VotingReward
    network: base
    source:
      abi: VotingReward
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VotingRewardClaim
        - VotingRewardSource
        - GaugeEpochData
      abis:
        - name: VotingReward
          file: ./abis/VotingReward.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: ClaimRewards(indexed address,indexed address,uint256)
          handler: handleClaimRewards
        - event: NotifyReward(indexed address,indexed address,indexed uint256,uint256)
          handler: handleNotifyReward
      file: ./src/voting-reward.ts
